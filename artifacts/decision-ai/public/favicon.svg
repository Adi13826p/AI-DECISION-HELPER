<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <rect width="180" height="180" rx="40" fill="url(#shine)"/>
  <!-- star antenna -->
  <path d="M90 14 L93 22 L101 22 L95 27 L97 35 L90 30 L83 35 L85 27 L79 22 L87 22 Z" fill="white" fill-opacity="0.95"/>
  <!-- antenna stem -->
  <line x1="90" y1="36" x2="90" y2="52" stroke="white" stroke-width="7" stroke-linecap="round" stroke-opacity="0.9"/>
  <!-- face -->
  <rect x="22" y="50" width="136" height="110" rx="52" fill="white" fill-opacity="0.18" stroke="white" stroke-width="5" stroke-opacity="0.8"/>
  <!-- left eye -->
  <circle cx="64" cy="93" r="21" fill="white"/>
  <circle cx="70" cy="86" r="9" fill="#ec4899"/>
  <circle cx="74" cy="82" r="4" fill="white"/>
  <!-- right eye -->
  <circle cx="116" cy="93" r="21" fill="white"/>
  <circle cx="122" cy="86" r="9" fill="#ec4899"/>
  <circle cx="126" cy="82" r="4" fill="white"/>
  <!-- blush left -->
  <ellipse cx="38" cy="120" rx="16" ry="11" fill="white" fill-opacity="0.28"/>
  <!-- blush right -->
  <ellipse cx="142" cy="120" rx="16" ry="11" fill="white" fill-opacity="0.28"/>
  <!-- smile -->
  <path d="M62 128 Q90 152 118 128" stroke="white" stroke-width="7" stroke-linecap="round" fill="none" stroke-opacity="0.95"/>
  <!-- sparkle top-right -->
  <path d="M148 42 L150 48 L156 50 L150 52 L148 58 L146 52 L140 50 L146 48 Z" fill="white" fill-opacity="0.8"/>
  <!-- sparkle bottom-left -->
  <circle cx="30" cy="148" r="5" fill="white" fill-opacity="0.5"/>
</svg>
